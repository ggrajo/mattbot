version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mattbot
      POSTGRES_USER: mattbot
      POSTGRES_PASSWORD: mattbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  realtime:
    build: ./realtime
    ports:
      - "3001:3001"
    env_file:
      - ./realtime/.env
    depends_on:
      - backend

volumes:
  pgdata:
